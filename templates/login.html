<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - RestoSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%); height: 100vh; display: flex; align-items: center; justify-content: center; color: #fff; }
        .login-box { background: rgba(20, 20, 35, 0.95); border: 2px solid rgba(0, 212, 255, 0.4); box-shadow: 0 0 50px rgba(0, 212, 255, 0.3); border-radius: 20px; padding: 3rem; width: 100%; max-width: 450px; backdrop-filter: blur(20px); }
        .form-control { background-color: rgba(30, 30, 50, 0.8); border: 2px solid rgba(0, 212, 255, 0.3); color: #fff; padding: 14px; border-radius: 12px; }
        .form-control:focus { border-color: #00d4ff; background-color: rgba(30, 30, 50, 0.95); color: #fff; box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }
        .btn-login { background: linear-gradient(135deg, #00d4ff, #0099ff); border: none; font-weight: 900; padding: 15px; color: #000; border-radius: 12px; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s; }
        .btn-login:hover { transform: scale(1.05); box-shadow: 0 10px 40px rgba(0, 212, 255, 0.7); }
        .title { color: #00d4ff; text-shadow: 0 0 30px rgba(0, 212, 255, 0.8); font-weight: 900; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="text-center mb-4">
            <h1 class="title">🍽️ RestoSystem</h1>
            <p class="text-secondary">Sistema de Gestión Gastronómica</p>
            <p class="text-glow" style="color: #00d4ff;">El Alto - La Paz</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}{% for cat, msg in messages %}<div class="alert alert-danger">{{ msg }}</div>{% endfor %}{% endif %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label text-glow" style="color: #00d4ff; font-weight: 700;">Usuario</label>
                <input type="text" name="nombre" class="form-control" value="admin" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-glow" style="color: #00d4ff; font-weight: 700;">Contraseña</label>
                <input type="password" name="contrasena" class="form-control" value="admin123" required>
            </div>
            <button type="submit" class="btn btn-login w-100">INGRESAR AL SISTEMA</button>
        </form>
    </div>
</body>
</html>
